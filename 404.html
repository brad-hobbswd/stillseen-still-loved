<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Page Not Found
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#0d1220;
--bg2:#1b2238;
--gold:#e7b55d;
--sunrise:#d88a3b;
--mist:#c7c2bd;
--cream:#f7f2ea;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

font-family:
Georgia,
"Times New Roman",
serif;

background:
linear-gradient(
to bottom,
var(--bg),
var(--bg2)
);

color:var(--cream);

text-align:center;

}

.container{

max-width:700px;

padding:50px;

background:
rgba(
255,
255,
255,
.04
);

border-radius:25px;

box-shadow:
0 15px 35px rgba(
0,
0,
0,
.25
);

}

.error{

font-size:6rem;

color:var(--gold);

margin-bottom:10px;

}

h1{

font-size:2.5rem;

margin-bottom:25px;

}

p{

line-height:1.9;

color:var(--mist);

margin-bottom:35px;

}

.quote{

padding:25px;

margin-bottom:35px;

background:
rgba(
255,
255,
255,
.03
);

border-left:
4px solid
var(--gold);

font-style:italic;

}

.button{

display:inline-block;

padding:
14px
28px;

border-radius:999px;

background:
var(--sunrise);

color:white;

font-weight:bold;

text-decoration:none;

transition:.3s;

}

.button:hover{

transform:
translateY(-3px);

}

</style>

</head>

<body>

<div class="container">

<div class="error">

404

</div>

<h1>

Looks Like This Page Wandered Off

</h1>

<p>

The page you were searching for could not be found. A missing path does not mean the journey ended.

</p>

<div class="quote">

"Even here, you are still seen.<br><br>

You are still loved."

</div>

<a
class="button"
href="index.html">

Return Home

</a>

</div>

</body>
</html>
